<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIニュースまとめ！（社内版）アーカイブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <h1>AIニュースまとめ！（社内版）アーカイブ</h1>
    <div class="header-sub">過去に掲載したニュースのアーカイブページです。キーワード検索・分野の絞り込みができます。</div>
    <a class="back-link" href="./">← 最新のニュースへ戻る</a>
  </div>
</header>

<div class="wrap">

  <div class="panel">
    <div class="searchbox">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
      <input id="q" type="search" placeholder="キーワードで検索（例：規制 / 資格 / ChatGPT）" aria-label="ニュースをキーワードで検索">
    </div>
    <div class="chips" id="chips" role="group" aria-label="分野で絞り込み"></div>
    <div class="result-count" id="count"></div>
  </div>

  <div id="list" class="grid"></div>

  <footer>本ページは公開報道をもとに社内向けに要約したものです。詳しくは各記事の出典リンクをご覧ください。</footer>
</div>

<script>window.PAGE_CONFIG = { mode: "archive", newDays: -1 };</script>
<script src="app.js"></script>
</body>
</html>
