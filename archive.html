<style>

  }

    padding:34px 18px 60px;
    border-radius:0 0 34px 34px;
  }
  .header-inner{max-width:1120px;margin:0 auto}
  header h1{
    font-family:"M PLUS Rounded 1c",sans-serif;
    font-weight:800;
    font-size:clamp(25px,4.6vw,34px);
    letter-spacing:.03em;
  }

  .today{
    display:inline-flex;align-items:center;gap:8px;
    margin-top:12px;
    background:rgba(255,255,255,.16);
    border:1.5px solid rgba(255,255,255,.38);
    padding:6px 18px;border-radius:999px;
    font-family:"M PLUS Rounded 1c",sans-serif;
    font-weight:700;font-size:13.5px;letter-spacing:.02em;
  }
  .today .t-sep{opacity:.55;font-weight:500}
  .header-sub{margin-top:10px;font-size:13.5px;opacity:.92}

    background:var(--card);
    border-radius:20px;
    box-shadow:0 8px 24px rgba(10,120,150,.10);
    padding:20px 22px;
    margin:-38px 0 26px;
    position:relative;
  }
  .searchbox{position:relative}
  .searchbox input{
    width:100%;
    font-size:15.5px;
    font-family:inherit;
    padding:12px 16px 12px 46px;
    border:2px solid var(--line);
    border-radius:999px;
    outline:none;
    transition:border-color .15s;
    background:#fbfdfe;
  }
  .searchbox input:focus{border-color:var(--primary)}
  .searchbox .icon{
    position:absolute;left:16px;top:50%;
    transform:translateY(-50%);
    width:19px;height:19px;color:var(--sub);
  }
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .chip{
    font-family:inherit;
    font-size:13px;font-weight:700;
    padding:6px 15px;border-radius:999px;
    border:1.5px solid var(--line);
    background:#fff;color:var(--sub);

  .chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
  .result-count{margin-top:12px;font-size:13px;color:var(--sub)}
  .result-count b{color:var(--primary-deep);font-size:15px}

    grid-template-columns:repeat(3,1fr);
    gap:20px;
    align-items:start;
  }

  @media (max-width:640px){.grid{grid-template-columns:1fr}}

    border-radius:20px;
    box-shadow:0 4px 14px rgba(50,90,110,.07);
    padding:20px 20px 16px;
    transition:transform .15s, box-shadow .15s;
    display:flex;
    flex-direction:column;
  }
  article:hover{transform:translateY(-3px);box-shadow:0 10px 22px rgba(50,90,110,.13)}

  }

  .terms .term-row{margin-bottom:5px}

  .src{
    font-size:12px;color:var(--sub);

    padding-top:8px;margin-top:auto;
  }

  .back-link{

/* ===================== 表示処理 ===================== */
const CAT_COLORS = {
  "法規制・権利": "var(--c-law)",
  "人材・組織":   "var(--c-hr)",
  "経営・投資":   "var(--c-biz)",
  "業務ツール":   "var(--c-tool)",
  "海外の動き":   "var(--c-world)",
  "産業動向":     "var(--c-ind)",
  "SNSの話題":    "var(--c-sns)"
};
const NEW_DAYS = -1; // 掲載からこの日数はNEW表示

const listEl  = document.getElementById("list");
const qEl     = document.getElementById("q");
const chipsEl = document.getElementById("chips");
const countEl = document.getElementById("count");

let activeCat = "すべて";

function fmtDate(s){
  const d = new Date(s + "T00:00:00");
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
}
function isNew(s){
  const d = new Date(s + "T00:00:00");
  return (Date.now() - d.getTime()) / 86400000 <= NEW_DAYS;
}
function esc(t){
  return t.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function buildChips(){
  const cats = ["すべて", ...Object.keys(CAT_COLORS).filter(c => NEWS_DATA.some(n => n.category === c))];
  chipsEl.innerHTML = cats.map(c =>
    `<button class="chip${c===activeCat?" active":""}" data-cat="${esc(c)}">${esc(c)}</button>`
  ).join("");
  chipsEl.querySelectorAll(".chip").forEach(b => b.addEventListener("click", () => {
    activeCat = b.dataset.cat;
    buildChips(); render();
  }));
}

function render(){
  const q = qEl.value.trim().toLowerCase();
  const sorted = [...NEWS_DATA].sort((a,b) => b.date.localeCompare(a.date));
  const hits = sorted.filter(n => {
    if(activeCat !== "すべて" && n.category !== activeCat) return false;
    if(!q) return true;
    const hay = [n.title, n.summary, n.hint, n.category, n.date,
                 ...n.terms.flatMap(t => [t.word, t.desc])].join(" ").toLowerCase();
    return q.split(/\s+/).every(w => hay.includes(w));
  });

  countEl.innerHTML = q || activeCat !== "すべて"
    ? `<b>${hits.length}</b> 件が見つかりました（全 ${NEWS_DATA.length} 件）`
    : `全 <b>${NEWS_DATA.length}</b> 件を掲載中`;

  if(hits.length === 0){
    listEl.innerHTML = `<div class="empty"><div class="face">🔍</div>見つかりませんでした。<br>別の言葉で検索してみてください。</div>`;
    return;
  }

  let prevD = null;
  listEl.innerHTML = hits.map(n => {
    const head = n.date !== prevD ? `<div class="day-head" id="d${n.date}">${fmtDate(n.date)}のニュース</div>` : "";
    prevD = n.date;
    return head + `
    <article>
      <div class="meta">
        <span class="cat" style="background:${CAT_COLORS[n.category] || "var(--primary)"}">${esc(n.category)}</span>
        <span class="date">${fmtDate(n.date)} 掲載</span>
        ${isNew(n.date) ? `<span class="badge-new">NEW</span>` : ""}
      </div>
      <h3>${esc(n.title)}</h3>
      <p>${esc(n.summary)}</p>
      ${n.hint ? `<div class="hint"><b class="h">注目ポイント：</b>${esc(n.hint)}</div>` : ""}
      ${n.terms.length ? `<div class="terms"><span class="t-title">用語解説</span>${
        n.terms.map(t => `<div class="term-row"><dt>${esc(t.word)}</dt><dd>${esc(t.desc)}</dd></div>`).join("")
      }</div>` : ""}
      <div class="src">出典：<a href="${esc(n.source.url)}" target="_blank" rel="noopener">${esc(n.source.label)}</a></div>
    </article>
  `;}).join("");
}

qEl.addEventListener("input", render);
buildChips();
render();

</script>
