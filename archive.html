    "hint": "外部のフリーランスパートナーと仕事をする際は、「AIをどこまで使ってよいか」「成果物にAIを使ったことを伝えるか」の取り決めを先に決めておくと、後々のトラブルを防げます。BizOn!ユーザーやセミナーの話題としても使える調査です。",
    "terms": [],
    "source": {
      "label": "グロースフリー合同会社（PR TIMES・2026年4月1日）",
      "url": "https://prtimes.jp/main/html/rd/p/000000003.000180271.html"
    }
  }
];

/* ===================== 表示処理 ===================== */
const CAT_COLORS = {
  "法規制・権利": "var(--c-law)",
  "人材・組織":   "var(--c-hr)",
  "経営・投資":   "var(--c-biz)",
  "業務ツール":   "var(--c-tool)",
  "海外の動き":   "var(--c-world)",
  "産業動向":     "var(--c-ind)",
  "SNSの話題":    "var(--c-sns)"
};
const NEW_DAYS = -1; // 掲載からこの日数はNEW表示

const listEl  = document.getElementById("list");
const qEl     = document.getElementById("q");
const chipsEl = document.getElementById("chips");
const countEl = document.getElementById("count");

let activeCat = "すべて";

function fmtDate(s){
  const d = new Date(s + "T00:00:00");
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
}
function isNew(s){
  const d = new Date(s + "T00:00:00");
  return (Date.now() - d.getTime()) / 86400000 <= NEW_DAYS;
}
function esc(t){
  return t.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function buildChips(){
  const cats = ["すべて", ...Object.keys(CAT_COLORS).filter(c => NEWS_DATA.some(n => n.category === c))];
  chipsEl.innerHTML = cats.map(c =>
    `<button class="chip${c===activeCat?" active":""}" data-cat="${esc(c)}">${esc(c)}</button>`
  ).join("");
  chipsEl.querySelectorAll(".chip").forEach(b => b.addEventListener("click", () => {
    activeCat = b.dataset.cat;
    buildChips(); render();
  }));
}

function render(){
  const q = qEl.value.trim().toLowerCase();
  const sorted = [...NEWS_DATA].sort((a,b) => b.date.localeCompare(a.date));
  const hits = sorted.filter(n => {
    if(activeCat !== "すべて" && n.category !== activeCat) return false;
    if(!q) return true;
    const hay = [n.title, n.summary, n.hint, n.category, n.date,
                 ...n.terms.flatMap(t => [t.word, t.desc])].join(" ").toLowerCase();
    return q.split(/\s+/).every(w => hay.includes(w));
  });

  countEl.innerHTML = q || activeCat !== "すべて"
    ? `<b>${hits.length}</b> 件が見つかりました（全 ${NEWS_DATA.length} 件）`
    : `全 <b>${NEWS_DATA.length}</b> 件を掲載中`;

  if(hits.length === 0){
    listEl.innerHTML = `<div class="empty"><div class="face">🔍</div>見つかりませんでした。<br>別の言葉で検索してみてください。</div>`;
    return;
  }

  let prevD = null;
  listEl.innerHTML = hits.map(n => {
    const head = n.date !== prevD ? `<div class="day-head" id="d${n.date}">${fmtDate(n.date)}のニュース</div>` : "";
    prevD = n.date;
    return head + `
    <article>
      <div class="meta">
        <span class="cat" style="background:${CAT_COLORS[n.category] || "var(--primary)"}">${esc(n.category)}</span>
        <span class="date">${fmtDate(n.date)} 掲載</span>
        ${isNew(n.date) ? `<span class="badge-new">NEW</span>` : ""}
      </div>
      <h3>${esc(n.title)}</h3>
      <p>${esc(n.summary)}</p>
      ${n.hint ? `<div class="hint"><b class="h">注目ポイント：</b>${esc(n.hint)}</div>` : ""}
      ${n.topReason ? `<div class="top-reason"><b>🎯 Webマーケター視点：</b>${esc(n.topReason)}</div>` : ""}
      ${n.terms.length ? `<div class="terms"><span class="t-title">用語解説</span>${
        n.terms.map(t => `<div class="term-row"><dt>${esc(t.word)}</dt><dd>${esc(t.desc)}</dd></div>`).join("")
      }</div>` : ""}
      <div class="src">出典：<a href="${esc(n.source.url)}" target="_blank" rel="noopener">${esc(n.source.label)}</a></div>
    </article>
  `;}).join("");
}

qEl.addEventListener("input", render);
buildChips();
render();

</script>
</body>
</html>
