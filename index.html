<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIニュースまとめ！（社内版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <h1>AIニュースまとめ！（社内版）</h1>
    <div class="today"><span id="t-date"></span><span class="t-sep">｜</span><span id="t-weather">…</span></div>
    <div class="header-sub">ビジネス・経営にかかわるAIの動きを、わかりやすい解説つきでお届けする社内向けページです。気になる言葉で検索してみてください。</div>
    <div class="last-updated" style="margin-top:8px;font-size:12.5px;opacity:.9">最終更新日：<span id="last-updated">—</span></div>
  </div>
</header>

<div class="wrap">

  <div class="panel">
    <div class="searchbox">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
      <input id="q" type="search" placeholder="キーワードで検索（例：規制 / 資格 / ChatGPT）" aria-label="ニュースをキーワードで検索">
    </div>
    <div class="chips" id="chips" role="group" aria-label="分野で絞り込み"></div>
    <div class="result-count" id="count"></div>
  </div>

  <div id="topnews" class="topnews"></div>

  <div id="list" class="grid"></div>

  <div class="archive-box">
    <div class="archive-title">📚 これより前のニュース</div>
    <div id="archive-list"></div>
    <div class="archive-note">通信量を抑えるため、過去の記事は日付ごとに別ページへまとめています。日付をクリックすると開きます。</div>
  </div>

  <footer>本ページは公開報道をもとに社内向けに要約したものです。詳しくは各記事の出典リンクをご覧ください。</footer>
</div>

<script>window.PAGE_CONFIG = { mode: "index", newDays: 1 };</script>
<script src="app.js"></script>
</body>
</html>
