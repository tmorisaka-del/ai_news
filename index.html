    padding:34px 18px 60px;
    border-radius:0 0 34px 34px;
  }
  .header-inner{max-width:1120px;margin:0 auto}
  header h1{
    font-family:"M PLUS Rounded 1c",sans-serif;
    font-weight:800;
    font-size:clamp(25px,4.6vw,34px);

  }

  .today{

    margin-top:12px;
    background:rgba(255,255,255,.16);

    font-weight:700;font-size:13.5px;letter-spacing:.02em;
  }

  .header-sub{margin-top:10px;font-size:13.5px;opacity:.92}

    padding:20px 22px;
    margin:-38px 0 26px;

  }

    font-size:15.5px;
    font-family:inherit;

    border:2px solid var(--line);
    border-radius:999px;
    outline:none;
    transition:border-color .15s;
    background:#fbfdfe;
  }

  .searchbox .icon{
    position:absolute;left:16px;top:50%;
    transform:translateY(-50%);
    width:19px;height:19px;color:var(--sub);
  }
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .chip{
    font-family:inherit;
    font-size:13px;font-weight:700;
    padding:6px 15px;border-radius:999px;
    border:1.5px solid var(--line);
    background:#fff;color:var(--sub);
    cursor:pointer;transition:all .15s;
  }
  .chip:hover{border-color:var(--primary);color:var(--primary-deep)}
  .chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
  .result-count{margin-top:12px;font-size:13px;color:var(--sub)}
  .result-count b{color:var(--primary-deep);font-size:15px}

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    align-items:start;
  }

  @media (max-width:640px){.grid{grid-template-columns:1fr}}

    border-radius:20px;

    padding:20px 20px 16px;
    transition:transform .15s, box-shadow .15s;
    display:flex;
    flex-direction:column;
  }

  .cat{
    font-size:11.5px;font-weight:700;color:#fff;
    padding:3px 12px;border-radius:999px;
  }
  .date{font-size:12px;color:var(--sub);font-weight:500}
  .badge-new{

    font-size:11px;font-weight:800;letter-spacing:.08em;
    color:#fff;background:var(--sun);
    padding:2px 10px;border-radius:999px;
    animation:pop 1.6s ease-in-out infinite;
  }

    font-family:"M PLUS Rounded 1c",sans-serif;
    font-weight:700;font-size:16.5px;line-height:1.55;

  .hint b.h{color:#c07d00}

  .terms .term-row{margin-bottom:5px}

  a:focus-visible,button:focus-visible,input:focus-visible{outline:3px solid var(--sun);outline-offset:2px}
</style>
</head>

/* ===================== 表示処理 ===================== */
const CAT_COLORS = {
  "法規制・権利": "var(--c-law)",
  "人材・組織":   "var(--c-hr)",
  "経営・投資":   "var(--c-biz)",
  "業務ツール":   "var(--c-tool)",
  "海外の動き":   "var(--c-world)",
  "産業動向":     "var(--c-ind)",
  "SNSの話題":    "var(--c-sns)"
};
const NEW_DAYS = 4; // 掲載からこの日数はNEW表示

const listEl  = document.getElementById("list");
const qEl     = document.getElementById("q");
const chipsEl = document.getElementById("chips");
const countEl = document.getElementById("count");

let activeCat = "すべて";

function fmtDate(s){
  const d = new Date(s + "T00:00:00");
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
}
function isNew(s){
  const d = new Date(s + "T00:00:00");
  return (Date.now() - d.getTime()) / 86400000 <= NEW_DAYS;
}
function esc(t){
  return t.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function buildChips(){
  const cats = ["すべて", ...Object.keys(CAT_COLORS).filter(c => NEWS_DATA.some(n => n.category === c))];
  chipsEl.innerHTML = cats.map(c =>
    `<button class="chip${c===activeCat?" active":""}" data-cat="${esc(c)}">${esc(c)}</button>`
  ).join("");
  chipsEl.querySelectorAll(".chip").forEach(b => b.addEventListener("click", () => {
    activeCat = b.dataset.cat;
    buildChips(); render();
  }));
}

function render(){
  const q = qEl.value.trim().toLowerCase();
  const sorted = [...NEWS_DATA].sort((a,b) => b.date.localeCompare(a.date));
  const hits = sorted.filter(n => {
    if(activeCat !== "すべて" && n.category !== activeCat) return false;
    if(!q) return true;
    const hay = [n.title, n.summary, n.hint, n.category, n.date,
                 ...n.terms.flatMap(t => [t.word, t.desc])].join(" ").toLowerCase();
    return q.split(/\s+/).every(w => hay.includes(w));
  });

  countEl.innerHTML = q || activeCat !== "すべて"
    ? `<b>${hits.length}</b> 件が見つかりました（全 ${NEWS_DATA.length} 件）`
    : `直近 <b>${NEWS_DATA.length}</b> 件を掲載中（過去分は下部のアーカイブから）`;

  if(hits.length === 0){
    listEl.innerHTML = `<div class="empty"><div class="face">🔍</div>見つかりませんでした。<br>別の言葉で検索してみてください。</div>`;
    return;
  }

  listEl.innerHTML = hits.map(n => `
    <article>
      <div class="meta">
        <span class="cat" style="background:${CAT_COLORS[n.category] || "var(--primary)"}">${esc(n.category)}</span>
        <span class="date">${fmtDate(n.date)} 掲載</span>
        ${isNew(n.date) ? `<span class="badge-new">NEW</span>` : ""}
      </div>
      <h3>${esc(n.title)}</h3>
      <p>${esc(n.summary)}</p>
      ${n.hint ? `<div class="hint"><b class="h">注目ポイント：</b>${esc(n.hint)}</div>` : ""}
      ${n.terms.length ? `<div class="terms"><span class="t-title">用語解説</span>${
        n.terms.map(t => `<div class="term-row"><dt>${esc(t.word)}</dt><dd>${esc(t.desc)}</dd></div>`).join("")
      }</div>` : ""}
      <div class="src">出典：<a href="${esc(n.source.url)}" target="_blank" rel="noopener">${esc(n.source.label)}</a></div>
    </article>
  `).join("");
}

function renderTop(){
  const el = document.getElementById("topnews");
  if(!el) return;
  const tops = NEWS_DATA.filter(n => n.topReason).sort((a,b) => b.date.localeCompare(a.date));
  if(!tops.length){ el.style.display = "none"; el.innerHTML = ""; return; }
  const n = tops[0];
  el.style.display = "";
  el.innerHTML = `
    <span class="tn-label">\u2600 \u4eca\u65e5\u306e\u30c8\u30c3\u30d7\u30cb\u30e5\u30fc\u30b9</span>
    <h2>${esc(n.title)}</h2>
    <div class="tn-summary">${esc(n.summary)}</div>
    <div class="tn-reason"><b>Web\u30de\u30fc\u30b1\u30bf\u30fc\u8996\u70b9\uff1a</b>${esc(n.topReason)}</div>
    <div class="tn-src">\u51fa\u5178\uff1a<a href="${esc(n.source.url)}" target="_blank" rel="noopener">${esc(n.source.label)}</a></div>
  `;
}

qEl.addEventListener("input", render);
buildChips();
render();
renderTop();

/* ===================== 日付と今日の天気（東京） =====================
   ページを開いた時点の日付と、Open-Meteo（無料の気象データAPI）から
   取得した東京の現在の天気・気温を表示します。
   取得に失敗した場合は日付のみ表示されます。
==================================================================== */
(function(){
  const dateEl = document.getElementById("t-date");
  const weatherEl = document.getElementById("t-weather");
  const now = new Date();
  const w = ["日","月","火","水","木","金","土"][now.getDay()];
  dateEl.textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${w}）`;

  function codeToWeather(c){
    if(c === 0) return ["☀️","快晴"];
    if(c === 1) return ["🌤️","晴れ"];
    if(c === 2) return ["⛅","晴れ時々くもり"];
    if(c === 3) return ["☁️","くもり"];
    if(c === 45 || c === 48) return ["🌫️","霧"];
    if(c >= 51 && c <= 57) return ["🌦️","霧雨"];
    if(c >= 61 && c <= 67) return ["🌧️","雨"];
    if(c >= 71 && c <= 77) return ["🌨️","雪"];
    if(c >= 80 && c <= 82) return ["🌦️","にわか雨"];
    if(c === 85 || c === 86) return ["🌨️","雪"];
    if(c >= 95) return ["⛈️","雷雨"];
    return ["🌡️","天気"];
  }

  fetch("https://api.open-meteo.com/v1/forecast?latitude=35.66&longitude=139.75&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&forecast_days=1&timezone=Asia%2FTokyo")
    .then(r => r.json())
    .then(d => {
      const [icon, name] = codeToWeather(d.current.weather_code);
      const t = Math.round(d.current.temperature_2m);
      const hi = Math.round(d.daily.temperature_2m_max[0]);
      const lo = Math.round(d.daily.temperature_2m_min[0]);
      weatherEl.textContent = `東京 ${icon} ${name} ${t}℃（最高${hi}℃／最低${lo}℃）`;
    })
    .catch(() => {
      weatherEl.textContent = "";
      weatherEl.previousElementSibling.style.display = "none"; // 区切り線も消す
    });
})();
</script>
